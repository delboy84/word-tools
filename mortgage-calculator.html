  <script>
          } else {
            this.compareResultA = { monthly: 0, interest: 0, total: 0 };
          }
          if (bLoan > 0 && bRate > 0 && bTerm > 0) {
            const m = this.calcMonthlyPayment(bLoan, bRate, bTerm);
            const total = m * bTerm * 12;
            this.compareResultB = { monthly: m, interest: total - bLoan, total: total };
          } else {
            this.compareResultB = { monthly: 0, interest: 0, total: 0 };
          }
        },

        calcStampDuty() {
          const price = parseFloat(this.sdPropertyPrice) || 0;
          if (price <= 0) { this.stampDutyAmount = 0; this.sdBands = []; return; }

          let bands = [];
          let totalTax = 0;

          if (this.firstTimeBuyer && !this.additionalProperty) {
            // UK first-time buyer rates (from Sept 2022)
            // 0% up to 425000, 5% 425001-625000, then standard rates above
            if (price <= 425000) {
              bands = [{ label: '£0 – £425,000 @ 0%', tax: 0 }];
            } else if (price <= 625000) {
              const tax = (price - 425000) * 0.05;
              bands = [
                { label: '£0 – £425,000 @ 0%', tax: 0 },
                { label: '£425,001 – £625,000 @ 5%', tax: tax }
              ];
              totalTax = tax;
            } else {
              // First-time buyer relief doesn't apply above £625,000 — use standard rates
              bands = this._standardSDLT(price);
              totalTax = bands.reduce((s, b) => s + b.tax, 0);
            }
          } else if (this.additionalProperty) {
            // Additional property surcharge: 3% on each band
            const surcharge = 0.03;
            const thresholds = [0, 250000, 925000, 1500000];
            const rates = [0.03 + surcharge, 0.05 + surcharge, 0.10 + surcharge, 0.12 + surcharge]; // 3%, 5%, 10%, 12% + 3%
            // Actually: standard 0/5/10/12 + 3% surcharge = 3/8/13/15
            const adjRates = [0.03, 0.08, 0.13, 0.15];
            bands = this._calcBands(price, thresholds, adjRates,
              ['0% + 3% surcharge', '5% + 3% surcharge', '10% + 3% surcharge', '12% + 3% surcharge'],
              ['£0 – £250,000', '£250,001 – £925,000', '£925,001 – £1,500,000', 'Over £1,500,000']
            );
            totalTax = bands.reduce((s, b) => s + b.tax, 0);
          } else {
            bands = this._standardSDLT(price);
            totalTax = bands.reduce((s, b) => s + b.tax, 0);
          }

          this.sdBands = bands;
          this.stampDutyAmount = totalTax;
        },

        _standardSDLT(price) {
          const thresholds = [0, 250000, 925000, 1500000];
          const rates = [0, 0.05, 0.10, 0.12];
          const labels = ['£0 – £250,000 @ 0%', '£250,001 – £925,000 @ 5%', '£925,001 – £1,500,000 @ 10%', 'Over £1,500,000 @ 12%'];
          return this._calcBands(price, thresholds, rates,
            ['0%', '5%', '10%', '12%'],
            ['£0 – £250,000', '£250,001 – £925,000', '£925,001 – £1,500,000', 'Over £1,500,000']
          );
        },

        _calcBands(price, thresholds, rates, rateLabels, rangeLabels) {
          const bands = [];
          for (let i = 0; i < thresholds.length; i++) {
            const lower = thresholds[i];
            const upper = i < thresholds.length - 1 ? thresholds[i + 1] : Infinity;
            if (price <= lower) break;
            const taxableInBand = Math.min(price, upper) - lower;
            const tax = taxableInBand * rates[i];
            bands.push({
              label: (rangeLabels[i] || '') + ' @ ' + (rateLabels[i] || ''),
              tax: tax
            });
          }
          return bands;
        },

        calcAffordability() {
          const income1 = parseFloat(this.annualIncome) || 0;
          const income2 = parseFloat(this.secondIncome) || 0;
          const commitments = parseFloat(this.monthlyCommitments) || 0;
          const totalIncome = income1 + income2;
          if (totalIncome <= 0) {
            this.maxBorrowing = 0;
            this.incomeMultiplier45 = 0;
            this.incomeMultiplier5 = 0;
            this.maxPropertyPrice = 0;
            return;
          }
          // Simple affordability: income multiple minus impact of commitments
          // Commitments reduce effective income by ~5× (lenders typically deduct from affordability)
          const effectiveIncome = Math.max(0, totalIncome - (commitments * 12));
          this.incomeMultiplier45 = effectiveIncome * 4.5;
          this.incomeMultiplier5 = effectiveIncome * 5;
          this.maxBorrowing = this.incomeMultiplier45; // Conservative
          // With 10% deposit
          this.maxPropertyPrice = this.maxBorrowing / 0.9;
        },

        async exportPDF() {
          if (this.monthlyPayment <= 0) { alert('Enter mortgage details first.'); return; }
          this.pdfLoading = true;
          try {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js';
            await new Promise((resolve, reject) => { script.onload = resolve; script.onerror = reject; document.head.appendChild(script); });
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const m = 10;
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            let y = m;

            function addFooter() {
              doc.setFontSize(7);
              doc.setFont('helvetica', 'italic');
              doc.setTextColor(150);
              doc.text('Generated by Thinker Toolbox — For illustration only, not financial advice', pageW / 2, pageH - 5, { align: 'center' });
            }

            function checkPage(needed) {
              if (y + needed > pageH - 15) { addFooter(); doc.addPage(); y = m; return true; }
              return false;
            }

            // Header
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30, 64, 175);
            doc.text('Thinker Toolbox \u2014 Mortgage Report', m, y + 5);
            y += 10;
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(100);
            doc.text('Generated: ' + dateStr, m, y);
            y += 6;
            doc.setDrawColor(200);
            doc.line(m, y, pageW - m, y);
            y += 6;

            // Input Summary
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30);
            doc.text('Input Summary', m, y);
            y += 6;
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(50);
            const pp = parseFloat(this.propertyPrice) || 0;
            const dep = parseFloat(this.deposit) || 0;
            const rate = parseFloat(this.interestRate) || 0;
            const term = parseInt(this.termYears) || 0;
            const inputs = [
              ['Property Price', '\u00a3' + this.fmtNum(pp)],
              ['Deposit', '\u00a3' + this.fmtNum(dep)],
              ['Loan Amount', '\u00a3' + this.fmtNum(this.loanAmount)],
              ['LTV', this.ltv + '%'],
              ['Interest Rate', rate + '%'],
              ['Term', term + ' years']
            ];
            inputs.forEach(([label, val]) => {
              doc.setFont('helvetica', 'bold'); doc.text(label + ':', m, y);
              doc.setFont('helvetica', 'normal'); doc.text(val, m + 55, y);
              y += 5;
            });
            y += 4;

            // Results
            checkPage(30);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30);
            doc.text('Results', m, y);
            y += 6;
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(50);
            const results = [
              ['Monthly Payment', '\u00a3' + this.fmtNum(this.monthlyPayment)],
              ['Total Interest', '\u00a3' + this.fmtNum(this.totalInterest)],
              ['Total Repaid', '\u00a3' + this.fmtNum(this.totalRepaid)]
            ];
            results.forEach(([label, val]) => {
              doc.setFont('helvetica', 'bold'); doc.text(label + ':', m, y);
              doc.setFont('helvetica', 'normal'); doc.text(val, m + 55, y);
              y += 5;
            });
            y += 4;

            // Amortization Table
            if (this.amortization.length > 0) {
              checkPage(20);
              doc.setFontSize(12);
              doc.setFont('helvetica', 'bold');
              doc.setTextColor(30);
              doc.text('Amortization Schedule (Year-by-Year)', m, y);
              y += 7;
              const cols = [m, m + 25, m + 60, m + 100, m + 140];
              const colW = [25, 35, 40, 40, 35];
              const headers = ['Year', 'Interest', 'Principal', 'Balance', ''];
              // Header row
              doc.setFillColor(30, 64, 175);
              doc.rect(m, y - 3, pageW - 2 * m, 6, 'F');
              doc.setFontSize(8);
              doc.setFont('helvetica', 'bold');
              doc.setTextColor(255);
              doc.text('Year', cols[0] + 1, y + 1);
              doc.text('Interest', cols[1] + 1, y + 1);
              doc.text('Principal', cols[2] + 1, y + 1);
              doc.text('Balance', cols[3] + 1, y + 1);
              y += 5;
              doc.setTextColor(50);
              doc.setFont('helvetica', 'normal');
              this.amortization.forEach((row, i) => {
                checkPage(8);
                if (i % 2 === 0) { doc.setFillColor(240, 240, 240); doc.rect(m, y - 3, pageW - 2 * m, 5, 'F'); }
                doc.text(String(row.year), cols[0] + 1, y + 1);
                doc.text('\u00a3' + this.fmtNum(row.interest), cols[1] + 1, y + 1);
                doc.text('\u00a3' + this.fmtNum(row.principal), cols[2] + 1, y + 1);
                doc.text('\u00a3' + this.fmtNum(row.balance), cols[3] + 1, y + 1);
                y += 5;
              });
              y += 4;
            }

            addFooter();
            doc.save('thinker-toolbox-mortgage-report.pdf');
          } catch (err) {
            alert('Failed to generate PDF. Please check your internet connection.');
          } finally {
            this.pdfLoading = false;
          }
        }
      };
    }
  </script>
