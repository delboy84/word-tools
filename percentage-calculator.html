  <script>
            case 'change':
              return {
                title: 'Percentage Change',
                calcType: this.tab,
                inputs: [
                  { label: 'From', value: '\u00a3' + this.fmtNum(this.changeFrom || 0) },
                  { label: 'To', value: '\u00a3' + this.fmtNum(this.changeTo || 0) }
                ],
                result: this.changeResult !== null ? (this.changeResult >= 0 ? '+' : '') + this.changeResult.toFixed(2) + '%' : 'N/A'
              };
            case 'iswhat':
              return {
                title: 'X is what % of Y',
                calcType: this.tab,
                inputs: [
                  { label: 'X', value: '\u00a3' + this.fmtNum(this.isWhatX || 0) },
                  { label: 'Y', value: '\u00a3' + this.fmtNum(this.isWhatY || 0) }
                ],
                result: this.isWhatResult !== null ? this.isWhatResult.toFixed(2) + '%' : 'N/A'
              };
            case 'reverse':
              return {
                title: 'Reverse Percentage',
                calcType: this.tab,
                inputs: [
                  { label: 'Amount including %', value: '\u00a3' + this.fmtNum(this.reverseAmount || 0) },
                  { label: 'Included %', value: (this.reversePercent || 0) + '%' },
                  { label: 'Mode', value: this.reverseMode === 'add' ? 'Amount includes +X%' : 'Amount includes -X%' }
                ],
                result: this.reverseResult !== null ? '\u00a3' + this.fmtNum(this.reverseResult) : 'N/A'
              };
            default:
              return { title: 'Percentage', calcType: this.tab, inputs: [], result: 'N/A' };
          }
        },

        async exportPDF() {
          this.pdfLoading = true;
          try {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js';
            await new Promise((resolve, reject) => { script.onload = resolve; script.onerror = reject; document.head.appendChild(script); });
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const m = 10;
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            let y = m;

            function addFooter() {
              doc.setFontSize(7);
              doc.setFont('helvetica', 'italic');
              doc.setTextColor(150);
              doc.text('Generated by Thinker Toolbox \u2014 For illustration only, not financial advice', pageW / 2, pageH - 5, { align: 'center' });
            }

            // Header
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30, 64, 175);
            doc.text('Thinker Toolbox \u2014 Percentage Report', m, y + 5);
            y += 10;
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(100);
            doc.text('Generated: ' + dateStr, m, y);
            y += 6;
            doc.setDrawColor(200);
            doc.line(m, y, pageW - m, y);
            y += 6;

            // Get data
            const data = this.getCurrentTabData();

            // Calculation Type
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30);
            doc.text('Calculation: ' + data.title, m, y);
            y += 8;

            // Inputs
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(50);
            if (data.inputs.length > 0) {
              doc.setFont('helvetica', 'bold');
              doc.text('Inputs:', m, y);
              y += 5;
              data.inputs.forEach(inp => {
                doc.setFont('helvetica', 'bold'); doc.text(inp.label + ':', m, y);
                doc.setFont('helvetica', 'normal'); doc.text(inp.value, m + 55, y);
                y += 5;
              });
              y += 4;
            }

            // Result
            doc.setFontSize(14);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(30, 64, 175);
            doc.text('Result: ' + data.result, m, y);

            addFooter();
            doc.save('thinker-toolbox-percentage-report.pdf');
          } catch (err) {
            alert('Failed to generate PDF. Please check your internet connection.');
          } finally {
            this.pdfLoading = false;
          }
        }
      };
    }
  </script>
