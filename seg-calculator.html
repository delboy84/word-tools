          });
        },

        calcDeemed() {
          const gen = parseFloat(this.deemedGen) || 0;
          const sc = parseFloat(this.deemedSelfCons) / 100;
          const rate = parseFloat(this.deemedRate) / 100;
          this.deemedExportKwh = gen * 0.5;
          this.actualExportKwh = gen * (1 - sc);
          this.deemedEarnings = this.deemedExportKwh * rate;
          this.actualEarnings = this.actualExportKwh * rate;
        },

        calcBat() {
          const gen = parseFloat(this.batGen) || 0;
          const scNo = parseFloat(this.batSelfConsNoBat) / 100;
          const scWith = parseFloat(this.batSelfConsWithBat) / 100;
          const segRate = parseFloat(this.batSegRate) / 100;
          const elecRate = parseFloat(this.batElecRate) / 100;
          const batCost = parseFloat(this.batteryCostInput) || 0;

          this.batNoBat = {
            selfConsumed: gen * scNo,
            exported: gen * (1 - scNo),
            segEarnings: gen * (1 - scNo) * segRate,
            importSavings: gen * scNo * elecRate,
            totalSavings: gen * scNo * elecRate + gen * (1 - scNo) * segRate
          };
          this.batWithBat = {
            selfConsumed: gen * scWith,
            exported: gen * (1 - scWith),
            segEarnings: gen * (1 - scWith) * segRate,
            importSavings: gen * scWith * elecRate,
            totalSavings: gen * scWith * elecRate + gen * (1 - scWith) * segRate
          };

          const extraSavings = this.batWithBat.totalSavings - this.batNoBat.totalSavings;
          this.batteryPaybackText = extraSavings > 0 && batCost > 0
            ? (batCost / extraSavings).toFixed(1) + ' years'
            : extraSavings > 0 ? 'Immediate' : 'N/A';
        },

        async exportPDF() {
          if (this.exportedKwh <= 0) { alert('Enter solar generation details first.'); return; }
          this.pdfLoading = true;
          try {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js';
            await new Promise((resolve, reject) => { script.onload = resolve; script.onerror = reject; document.head.appendChild(script); });
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const m = 10;
            let y = m;
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            function addFooter() {
              doc.setFontSize(7); doc.setFont('helvetica', 'italic'); doc.setTextColor(150);
              doc.text('Generated by Thinker Toolbox — For illustration only, not financial advice', pageW / 2, pageH - 5, { align: 'center' });
            }
            function checkPage(needed) { if (y + needed > pageH - 15) { addFooter(); doc.addPage(); y = m; } }

            doc.setFontSize(16); doc.setFont('helvetica', 'bold'); doc.setTextColor(30, 64, 175);
            doc.text('Thinker Toolbox \u2014 SEG Earnings Report', m, y + 5); y += 10;
            doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(100);
            doc.text('Generated: ' + dateStr, m, y); y += 6;
            doc.setDrawColor(200); doc.line(m, y, pageW - m, y); y += 6;

            doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.setTextColor(30);
            doc.text('Input Details', m, y); y += 6;
            doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.setTextColor(50);
            const inputs = [
              ['Annual Generation', this.fmtNum0(this.annualGen) + ' kWh'],
              ['Self-Consumption', this.selfConsumption + '%'],
              ['Exported', this.fmtNum0(this.exportedKwh) + ' kWh']
            ];
            inputs.forEach(([label, val]) => {
              doc.setFont('helvetica', 'bold'); doc.text(label + ':', m, y);
              doc.setFont('helvetica', 'normal'); doc.text(val, m + 55, y); y += 5;
            }); y += 4;

            checkPage(30);
            doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.setTextColor(30);
            doc.text('Provider Comparison', m, y); y += 7;
            doc.setFillColor(30, 64, 175); doc.rect(m, y - 3, pageW - 2 * m, 6, 'F');
            doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(255);
            doc.text('Provider', m + 1, y + 1); doc.text('Rate', m + 60, y + 1);
            doc.text('Annual', m + 85, y + 1); doc.text('25-Year', m + 120, y + 1); y += 5;
            doc.setTextColor(50); doc.setFont('helvetica', 'normal');
            this.providers.forEach((p, i) => {
              checkPage(8);
              if (i % 2 === 0) { doc.setFillColor(240, 240, 240); doc.rect(m, y - 3, pageW - 2 * m, 5, 'F'); }
              doc.text(p.name + (p.best ? ' ⭐' : ''), m + 1, y + 1);
              doc.text(p.rate + 'p', m + 60, y + 1);
              doc.text('\u00a3' + this.fmtNum(p.annual), m + 85, y + 1);
              doc.text('\u00a3' + this.fmtNum0(p.year25), m + 120, y + 1); y += 5;
            });

            addFooter();
            doc.save('thinker-toolbox-seg-report.pdf');
          } catch (err) {
            alert('Failed to generate PDF. Please check your internet connection.');
          } finally {
            this.pdfLoading = false;
          }
        }
      };
    }
