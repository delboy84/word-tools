  <!-- Alpine.js App -->
  <script>
    function colourPicker() {
      return {
        // State
        hue: 217,
        saturation: 91,
        lightness: 60,
        hexInput: '#3B82F6',
        hexError: '',
        paletteType: 'complementary',
        contrastFg: '#FFFFFF',
        contrastBg: '#3B82F6',
        darkMode: false,
        showToast: false,
        toastMessage: '',
        edgeWarning: '',

        paletteTypes: [
          { key: 'complementary', label: 'Complementary' },
          { key: 'splitComplementary', label: 'Split-Comp' },
          { key: 'triadic', label: 'Triadic' },
          { key: 'tetradic', label: 'Tetradic' },
          { key: 'analogous', label: 'Analogous' },
          { key: 'monochromatic', label: 'Monochromatic' }
        ],

        // Computed
        get baseHex() {
          return hslToHex(this.hue, this.saturation, this.lightness);
        },
        get baseRgb() {
          return hslToRgb(this.hue, this.saturation, this.lightness);
        },
        get bestText() {
          return bestTextColor(this.baseHex);
        },
        get currentPalette() {
          return generatePalettes(this.hue, this.saturation, this.lightness)[this.paletteType];
        },
        get contrastResult() {
          try {
            return meetsWCAG(this.contrastFg, this.contrastBg);
          } catch (e) {
            return { ratio: '—', passesAA: false, passesAAA: false, passesAALarge: false };
          }
        },

        // Methods
        init() {
          // Detect dark mode
          const saved = localStorage.getItem('colourPickerDarkMode');
          if (saved !== null) {
            this.darkMode = saved === 'true';
          } else {
            this.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          this.applyDarkMode();
        },

        updateFromSliders() {
          this.hexInput = hslToHex(this.hue, this.saturation, this.lightness).toUpperCase();
          this.hexError = '';
          this.contrastBg = hslToHex(this.hue, this.saturation, this.lightness).toUpperCase();
          this.checkEdgeCases();
        },

        updateFromHex() {
          let hex = this.hexInput.trim();
          if (!hex.startsWith('#')) hex = '#' + hex;
          const clean = hex.replace('#', '');
          if (clean.length === 3) {
            const expanded = clean[0]+clean[0]+clean[1]+clean[1]+clean[2]+clean[2];
            hex = '#' + expanded;
          }
          if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
            const hsl = hexToHsl(hex);
            this.hue = hsl.h;
            this.saturation = hsl.s;
            this.lightness = hsl.l;
            this.hexInput = hex.toUpperCase();
            this.hexError = '';
            this.contrastBg = hex.toUpperCase();
            this.checkEdgeCases();
          } else if (clean.length === 6 && !/^[0-9A-Fa-f]{6}$/.test(clean)) {
            this.hexError = 'Invalid hex colour';
          }
        },

        updateFromNativePicker(event) {
          this.hexInput = event.target.value.toUpperCase();
          this.updateFromHex();
        },

        validateContrastInput(which) {
          // Normalise hex input
          let hex = which === 'fg' ? this.contrastFg : this.contrastBg;
          if (!hex.startsWith('#')) {
            hex = '#' + hex;
            if (which === 'fg') this.contrastFg = hex;
            else this.contrastBg = hex;
          }
        },

        checkEdgeCases() {
          const result = adjustForEdgeCases(this.hue, this.saturation, this.lightness);
          this.edgeWarning = result.warning || result.note || '';
        },

        bestTextColorForHSL(h, s, l) {
          const hex = hslToHex(h, s, l);
          return bestTextColor(hex);
        },

        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('colourPickerDarkMode', this.darkMode);
          this.applyDarkMode();
        },

        applyDarkMode() {
          document.documentElement.classList.toggle('dark', this.darkMode);
        },

        copyToClipboard(value) {
          navigator.clipboard.writeText(value).then(() => {
            this.toastMessage = `Copied: ${value}`;
            this.showToast = true;
            setTimeout(() => { this.showToast = false; }, 2000);
          }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = value;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            this.toastMessage = `Copied: ${value}`;
            this.showToast = true;
            setTimeout(() => { this.showToast = false; }, 2000);
          });
        },

        copyCssVariables() {
          const palette = generatePalettes(this.hue, this.saturation, this.lightness)[this.paletteType];
          let css = ':root {\n';
          palette.forEach((c, i) => {
            const hex = hslToHex(c.h, c.s, c.l);
            css += `  --colour-${i + 1}: ${hex};\n`;
          });
          css += '}';
          this.copyToClipboard(css);
        },

        copyPaletteJson() {
          const palette = generatePalettes(this.hue, this.saturation, this.lightness)[this.paletteType];
          const json = JSON.stringify(palette.map(c => ({
            h: c.h, s: c.s, l: c.l,
            hex: hslToHex(c.h, c.s, c.l),
            rgb: hslToRgb(c.h, c.s, c.l)
          })), null, 2);
          this.copyToClipboard(json);
        },

        // Image extraction
        extractedColours: [],
        selectedExtracted: -1,

        extractFromImage(event) {
          const file = event.target.files[0];
          if (!file) return;

          const img = new Image();
          const reader = new FileReader();

          reader.onload = (e) => {
            img.onload = () => {
              const canvas = this.$refs.imageCanvas;
              const ctx = canvas.getContext('2d');

              // Scale image down for performance
              const maxDim = 100;
              const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
              canvas.width = Math.round(img.width * scale);
              canvas.height = Math.round(img.height * scale);
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const pixels = imageData.data;

              // Collect pixel colours (skip transparent)
              const colours = [];
              for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i + 3] < 128) continue; // skip transparent
                colours.push({ r: pixels[i], g: pixels[i + 1], b: pixels[i + 2] });
              }

              // Simple k-means clustering to find dominant colours
              const k = 5;
              const dominant = this.kMeansColours(colours, k);

              this.extractedColours = dominant.map(c => {
                const hex = rgbToHex(c.r, c.g, c.b);
                const hsl = rgbToHsl(c.r, c.g, c.b);
                return { hex: hex.toUpperCase(), hsl, rgb: c };
              });

              // Auto-apply the dominant colour
              this.applyExtractedColour(0);
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);

          // Reset input so same file can be selected again
          event.target.value = '';
        },

        kMeansColours(pixels, k) {
          if (pixels.length === 0) return [];
          if (pixels.length <= k) return pixels;

          // Initialise centroids randomly from pixels
          const centroids = [];
          const used = new Set();
          for (let i = 0; i < k; i++) {
            let idx;
            do { idx = Math.floor(Math.random() * pixels.length); } while (used.has(idx) && used.size < pixels.length);
            used.add(idx);
            centroids.push({ r: pixels[idx].r, g: pixels[idx].g, b: pixels[idx].b });
          }

          // Run k-means iterations
          for (let iter = 0; iter < 10; iter++) {
            const clusters = Array.from({ length: k }, () => []);

            // Assign each pixel to nearest centroid
            for (const p of pixels) {
              let minDist = Infinity;
              let minIdx = 0;
              for (let c = 0; c < k; c++) {
                const dr = p.r - centroids[c].r;
                const dg = p.g - centroids[c].g;
                const db = p.b - centroids[c].b;
                const dist = dr * dr + dg * dg + db * db;
                if (dist < minDist) {
                  minDist = dist;
                  minIdx = c;
                }
              }
              clusters[minIdx].push(p);
            }

            // Update centroids
            for (let c = 0; c < k; c++) {
              if (clusters[c].length === 0) continue;
              const sum = clusters[c].reduce((acc, p) => ({ r: acc.r + p.r, g: acc.g + p.g, b: acc.b + p.b }), { r: 0, g: 0, b: 0 });
              centroids[c] = {
                r: Math.round(sum.r / clusters[c].length),
                g: Math.round(sum.g / clusters[c].length),
                b: Math.round(sum.b / clusters[c].length)
              };
            }
          }

          // Sort by cluster size (most dominant first)
          const clusters = Array.from({ length: k }, () => []);
          for (const p of pixels) {
            let minDist = Infinity;
            let minIdx = 0;
            for (let c = 0; c < k; c++) {
              const dr = p.r - centroids[c].r;
              const dg = p.g - centroids[c].g;
              const db = p.b - centroids[c].b;
              const dist = dr * dr + dg * dg + db * db;
              if (dist < minDist) {
                minDist = dist;
                minIdx = c;
              }
            }
            clusters[minIdx].push(p);
          }

          // Return centroids sorted by cluster size
          return centroids
            .map((c, i) => ({ ...c, count: clusters[i].length }))
            .sort((a, b) => b.count - a.count)
            .map(({ r, g, b }) => ({ r, g, b }));
        },

        applyExtractedColour(index) {
          const c = this.extractedColours[index];
          if (!c) return;
          this.selectedExtracted = index;
          this.hue = c.hsl.h;
          this.saturation = c.hsl.s;
          this.lightness = c.hsl.l;
          this.hexInput = c.hex;
          this.contrastBg = c.hex;
          this.checkEdgeCases();
        }
      };
    }
  </script>

      <div class="flex gap-2 shrink-0">
    }
  })();
  </script>
