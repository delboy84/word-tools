<!DOCTYPE html>
<html lang="en" class="">
<head>
  <script>

          // Monthly generation (UK seasonal distribution)
          const monthFactors = [0.03, 0.04, 0.07, 0.09, 0.11, 0.13, 0.13, 0.12, 0.09, 0.07, 0.05, 0.03];
          const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const maxMonth = Math.max(...monthFactors) * annualGen;
          this.monthlyData = monthFactors.map((f, i) => ({
            month: monthNames[i],
            kwh: f * annualGen,
            pct: maxMonth > 0 ? (f * annualGen / maxMonth * 100) : 0
          }));

          // Season daily averages
          const springGen = (monthFactors[2] + monthFactors[3] + monthFactors[4]) * annualGen;
          const summerGen = (monthFactors[5] + monthFactors[6] + monthFactors[7]) * annualGen;
          const autumnGen = (monthFactors[8] + monthFactors[9] + monthFactors[10]) * annualGen;
          const winterGen = (monthFactors[11] + monthFactors[0] + monthFactors[1]) * annualGen;
          this.seasonDaily = {
            spring: springGen / 92,
            summer: summerGen / 92,
            autumn: autumnGen / 91,
            winter: winterGen / 90
          };

          // Compare: without battery (40% self-consumption)
          this.calcCompareRow(this.compareNoBattery, annualGen, 0.4, cost, rate, seg);
          // With battery (80% self-consumption)
          this.calcCompareRow(this.compareWithBattery, annualGen, 0.8, cost + (this.hasBattery ? parseFloat(this.batteryCost) || 0 : 5000), rate, seg);

          const extraSavings = this.compareWithBattery.annualSavings - this.compareNoBattery.annualSavings;
          const batCost = this.hasBattery ? parseFloat(this.batteryCost) || 0 : 5000;
          this.batteryExtraPayback = extraSavings > 0 ? (batCost / extraSavings).toFixed(1) + ' years' : 'N/A';

          // Size comparison
          this.sizeComparison = [4, 6, 8].map(s => {
            const gen = s * genFactor * orient;
            const scKwh = gen * sc;
            const expKwh = gen * (1 - sc);
            const sav = scKwh * (rate / 100) + expKwh * (seg / 100);
            const c = s * 1625;
            let s25 = 0;
            for (let y = 1; y <= 25; y++) {
              const deg = Math.pow(0.995, y - 1);
              const yg = gen * deg;
              s25 += yg * sc * (rate * Math.pow(1 + inflation, y - 1) / 100) + yg * (1 - sc) * (seg * Math.pow(1 + 0.02, y - 1) / 100);
            }
            return { size: s, gen, savings: sav, payback: sav > 0 ? c / sav : 0, savings25: s25 - c };
          });
        },

        calcCompareRow(obj, annualGen, sc, cost, rate, seg) {
          const selfConsumed = annualGen * sc;
          const exported = annualGen * (1 - sc);
          const annualSavings = selfConsumed * (rate / 100) + exported * (seg / 100);
          obj.selfConsumed = selfConsumed;
          obj.exported = exported;
          obj.annualSavings = annualSavings;
          obj.payback = annualSavings > 0 ? cost / annualSavings : 0;
        },

        async exportPDF() {
          if (this.results.annualGen <= 0) { alert('Enter system details first.'); return; }
          this.pdfLoading = true;
          try {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js';
            await new Promise((resolve, reject) => { script.onload = resolve; script.onerror = reject; document.head.appendChild(script); });
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const m = 10;
            let y = m;
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            function addFooter() {
              doc.setFontSize(7); doc.setFont('helvetica', 'italic'); doc.setTextColor(150);
              doc.text('Generated by Thinker Toolbox — For illustration only, not financial advice', pageW / 2, pageH - 5, { align: 'center' });
            }
            function checkPage(needed) { if (y + needed > pageH - 15) { addFooter(); doc.addPage(); y = m; } }

            doc.setFontSize(16); doc.setFont('helvetica', 'bold'); doc.setTextColor(30, 64, 175);
            doc.text('Thinker Toolbox \u2014 Solar Panel Report', m, y + 5); y += 10;
            doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(100);
            doc.text('Generated: ' + dateStr, m, y); y += 6;
            doc.setDrawColor(200); doc.line(m, y, pageW - m, y); y += 6;

            doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.setTextColor(30);
            doc.text('System Details', m, y); y += 6;
            doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.setTextColor(50);
            const inputs = [
              ['System Size', this.systemSize + ' kW'],
              ['Installation Cost', '\u00a3' + this.fmtNum(this.installCost)],
              ['Annual Usage', this.fmtNum0(this.annualUsage) + ' kWh'],
              ['Electricity Rate', this.elecRate + 'p/kWh'],
              ['SEG Export Rate', this.segRate + 'p/kWh'],
              ['Self-Consumption', this.selfConsumption + '%'],
              ['Battery', this.hasBattery ? this.batteryCapacity + ' kWh (\u00a3' + this.fmtNum(this.batteryCost) + ')' : 'No'],
              ['Region', this.region + ' kWh/kWp/yr'],
              ['Orientation', Math.round(parseFloat(this.orientation) * 100) + '%']
            ];
            inputs.forEach(([label, val]) => {
              doc.setFont('helvetica', 'bold'); doc.text(label + ':', m, y);
              doc.setFont('helvetica', 'normal'); doc.text(val, m + 55, y); y += 5;
            });
            y += 4;

            checkPage(30);
            doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.setTextColor(30);
            doc.text('Results', m, y); y += 6;
            doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.setTextColor(50);
            const res = [
              ['Annual Generation', this.fmtNum0(this.results.annualGen) + ' kWh'],
              ['Self-Consumed', this.fmtNum0(this.results.selfConsumed) + ' kWh'],
              ['Exported', this.fmtNum0(this.results.exported) + ' kWh'],
              ['Annual Savings', '\u00a3' + this.fmtNum(this.results.annualSavings)],
              ['Payback Period', this.results.payback.toFixed(1) + ' years'],
              ['25-Year Net Savings', '\u00a3' + this.fmtNum0(this.results.savings25yr)],
              ['CO\u2082 Saved (25yr)', this.fmtNum0(this.results.co2Saved) + ' tonnes'],
              ['ROI', this.results.roi + '%']
            ];
            res.forEach(([label, val]) => {
              doc.setFont('helvetica', 'bold'); doc.text(label + ':', m, y);
              doc.setFont('helvetica', 'normal'); doc.text(val, m + 55, y); y += 5;
            });

            addFooter();
            doc.save('thinker-toolbox-solar-report.pdf');
          } catch (err) {
            alert('Failed to generate PDF. Please check your internet connection.');
          } finally {
            this.pdfLoading = false;
          }
        }
      };
    }
  </script>

      <div class="flex gap-2 shrink-0">
    }
  })();
  </script>
