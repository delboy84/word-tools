<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4139013229012013"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Tools — Free Online Calculators, Word Puzzle Solvers & Colour Picker</title>
  <meta name="description" content="Free offline-capable calculators, word puzzle solvers and colour picker. Mortgage, percentage, savings calculators, crossword solver, anagram finder, Wordle helper, Scrabble word finder. No tracking.">
  <meta name="keywords" content="crossword solver, anagram solver, wordle helper, scrabble word finder, colour picker, palette generator, word puzzle, word tools">
  <meta property="og:title" content="Word Tools — Free Online Calculators, Word Puzzle Solvers & Colour Picker">
  <meta property="og:description" content="Free offline-capable calculators, word puzzle solvers and colour picker. No tracking.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Word Tools — Free Online Calculators, Puzzle Solvers & Colour Picker">
  <meta name="twitter:description" content="Free offline-capable calculators, word puzzle solvers and colour palette generator. No tracking.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200" x-data="landing()" x-init="init()">

  <div class="px-3 py-4 md:px-4 md:py-8 md:max-w-2xl md:mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 md:mb-8">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900 dark:text-gray-100">🛠️ Word Tools</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Free offline-capable puzzle solvers & utilities</p>
      </div>
      <button @click="toggleDark()" class="p-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition" :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <span x-show="darkMode" class="text-xl">☀️</span>
        <span x-show="!darkMode" class="text-xl">🌙</span>
      </button>
    </div>

    <!-- Calculators Section -->
    <h2 class="text-sm font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">Calculators</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 mb-4 md:mb-8">
      <template x-for="card in calcCards" :key="card.href">
        <a :href="card.href" class="flex items-center gap-3 p-4 md:p-6 md:block bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:shadow-md border border-gray-100 dark:border-gray-700 transition group">
          <div class="text-2xl md:text-3xl md:mb-3 shrink-0" x-text="card.icon"></div>
          <div>
            <h3 class="text-base md:text-lg font-semibold text-gray-900 dark:text-gray-100 group-hover:text-blue-600 dark:group-hover:text-cyan-400 transition" x-text="card.title"></h3>
            <p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 mt-0.5 md:mt-1" x-text="card.desc"></p>
          </div>
        </a>
      </template>
    </div>

    <!-- Word Tools Section -->
    <h2 class="text-sm font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">Word Puzzles</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 mb-4 md:mb-8">
      <template x-for="card in wordCards" :key="card.href">
        <a :href="card.href" class="flex items-center gap-3 p-4 md:p-6 md:block bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:shadow-md border border-gray-100 dark:border-gray-700 transition group">
          <div class="text-2xl md:text-3xl md:mb-3 shrink-0" x-text="card.icon"></div>
          <div>
            <h3 class="text-base md:text-lg font-semibold text-gray-900 dark:text-gray-100 group-hover:text-blue-600 dark:group-hover:text-cyan-400 transition" x-text="card.title"></h3>
            <p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 mt-0.5 md:mt-1" x-text="card.desc"></p>
          </div>
        </a>
      </template>
    </div>

    <!-- Utilities Section -->
    <h2 class="text-sm font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">Utilities</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 mb-4 md:mb-8">
      <template x-for="card in utilCards" :key="card.href">
        <a :href="card.href" class="flex items-center gap-3 p-4 md:p-6 md:block bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:shadow-md border border-gray-100 dark:border-gray-700 transition group">
          <div class="text-2xl md:text-3xl md:mb-3 shrink-0" x-text="card.icon"></div>
          <div>
            <h3 class="text-base md:text-lg font-semibold text-gray-900 dark:text-gray-100 group-hover:text-blue-600 dark:group-hover:text-cyan-400 transition" x-text="card.title"></h3>
            <p class="text-xs md:text-sm text-gray-500 dark:text-gray-400 mt-0.5 md:mt-1" x-text="card.desc"></p>
          </div>
        </a>
      </template>
    </div>

    <!-- Footer -->
    <div class="text-center text-xs text-gray-400 dark:text-gray-600 mt-12">
      Works offline · Built with ♥ · <a href="about.html" class="text-blue-600 dark:text-cyan-400 hover:underline">About</a>
    </div>
  </div>

  <script>
    function landing() {
      return {
        darkMode: false,
        wordCards: [
          { href: 'crossword.html', icon: '🔤', title: 'Crossword Solver', desc: 'Find words matching a pattern. Use ? for unknown letters.' },
          { href: 'anagram.html', icon: '🔄', title: 'Anagram Solver', desc: 'Unscramble letters to find all valid words.' },
          { href: 'wordle.html', icon: '🟩', title: 'Wordle Solver', desc: 'Get optimal guesses for your daily Wordle.' },
          { href: 'scrabble.html', icon: '🀄', title: 'Scrabble Finder', desc: 'Find highest-scoring words from your rack.' }
        ],
        calcCards: [
          { href: 'mortgage-calculator.html', icon: '🏠', title: 'Mortgage Calculator', desc: 'Monthly payments, amortization, stamp duty & affordability.' },
          { href: 'percentage-calculator.html', icon: '📊', title: 'Percentage Calculator', desc: 'Percentage of a number, increase/decrease, reverse % & VAT.' },
          { href: 'savings-calculator.html', icon: '📈', title: 'Savings Calculator', desc: 'Compound interest, goal-based savings & inflation-adjusted returns.' },
          { href: 'salary-calculator.html', icon: '💷', title: 'Salary Calculator', desc: 'UK take-home pay with tax, NI, student loans & pension deductions.' },
          { href: 'pension-calculator.html', icon: '🏖️', title: 'Pension Calculator', desc: 'Retirement projections, state pension age & drawdown vs annuity.' },
          { href: 'loan-calculator.html', icon: '🏦', title: 'Loan Calculator', desc: 'Personal loans, car finance (HP & PCP), credit card payoff & amortization.' }
        ],
        utilCards: [
          { href: 'colour-picker.html', icon: '🎨', title: 'Colour Picker', desc: 'Generate harmonious colour palettes with contrast checking.' },
          { href: 'sudoku.html', icon: '🔢', title: 'Sudoku Solver', desc: 'Solve 4×4, 9×9, and 16×16 Sudoku puzzles instantly.' },
          { href: 'tip-split.html', icon: '💰', title: 'Tip Calculator', desc: 'Calculate tips and split bills between friends.' },
          { href: 'cooking.html', icon: '🍳', title: 'Cooking Converter', desc: 'Convert measurements, scale recipes, and reference ingredient densities.' }
        ],
        init() {
          const saved = localStorage.getItem('darkMode');
          if (saved === 'true' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            this.darkMode = true;
            document.documentElement.classList.add('dark');
          }
        },
        toggleDark() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('darkMode', this.darkMode);
          document.documentElement.classList.toggle('dark', this.darkMode);
        }
      };
    }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
