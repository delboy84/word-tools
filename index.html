  <script>
    function landing() {
      return {
        darkMode: false,
        wordCards: [
          { href: 'crossword.html', icon: '🔤', title: 'Crossword Solver', desc: 'Find words matching a pattern. Use ? for unknown letters.' },
          { href: 'anagram.html', icon: '🔄', title: 'Anagram Solver', desc: 'Unscramble letters to find all valid words.' },
          { href: 'wordle.html', icon: '🟩', title: 'Wordle Solver', desc: 'Get optimal guesses for your daily Wordle.' },
          { href: 'scrabble.html', icon: '🀄', title: 'Scrabble Finder', desc: 'Find highest-scoring words from your rack.' }
        ],
        energyCards: [
          { href: 'solar-calculator.html', icon: '🔆', title: 'Solar Calculator', desc: 'Solar panel savings, ROI & payback period with or without battery.' },
          { href: 'seg-calculator.html', icon: '⚡', title: 'SEG Earnings', desc: 'Compare Smart Export Guarantee rates and maximise your solar export income.' },
          { href: 'octopus-tariff-calculator.html', icon: '🐙', title: 'Octopus Tariff Compare', desc: 'Find the best Octopus Energy tariff for solar panels & battery storage.' }
        ],
        calcCards: [
          { href: 'mortgage-calculator.html', icon: '🏠', title: 'Mortgage Calculator', desc: 'Monthly payments, amortization, stamp duty & affordability.' },
          { href: 'percentage-calculator.html', icon: '📊', title: 'Percentage Calculator', desc: 'Percentage of a number, increase/decrease, reverse % & VAT.' },
          { href: 'savings-calculator.html', icon: '📈', title: 'Savings Calculator', desc: 'Compound interest, goal-based savings & inflation-adjusted returns.' },
          { href: 'salary-calculator.html', icon: '💷', title: 'Salary Calculator', desc: 'UK take-home pay with tax, NI, student loans & pension deductions.' },
          { href: 'pension-calculator.html', icon: '🏖️', title: 'Pension Calculator', desc: 'Retirement projections, state pension age & drawdown vs annuity.' },
          { href: 'loan-calculator.html', icon: '🏦', title: 'Loan Calculator', desc: 'Personal loans, car finance (HP & PCP), credit card payoff & amortization.' },
          { href: 'date-calculator.html', icon: '📅', title: 'Date Calculator', desc: 'Days between dates, age calculator, add/subtract days & UK bank holidays.' }
        ],
        utilCards: [
          { href: 'colour-picker.html', icon: '🎨', title: 'Colour Picker', desc: 'Generate harmonious colour palettes with contrast checking.' },
          { href: 'sudoku.html', icon: '🔢', title: 'Sudoku Solver', desc: 'Solve 4×4, 9×9, and 16×16 Sudoku puzzles instantly.' },
          { href: 'tip-split.html', icon: '💰', title: 'Tip Calculator', desc: 'Calculate tips and split bills between friends.' },
          { href: 'cooking.html', icon: '🍳', title: 'Cooking Converter', desc: 'Convert measurements, scale recipes, and reference ingredient densities.' }
        ],
        init() {
          const saved = localStorage.getItem('darkMode');
          if (saved === 'true' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            this.darkMode = true;
            document.documentElement.classList.add('dark');
          }
        },
        toggleDark() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('darkMode', this.darkMode);
          document.documentElement.classList.toggle('dark', this.darkMode);
        }
      };
    }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>

  <!-- Cookie Consent Banner -->
  <div x-data="{ showBanner: !localStorage.getItem('cookieConsent') }" x-show="showBanner" x-transition

    <div class="max-w-2xl mx-auto flex flex-col sm:flex-row items-start sm:items-center gap-3">
      <p class="text-sm text-gray-700 dark:text-gray-300 flex-1">🍪 We use Google AdSense which may set cookies for personalised ads. You can accept or reject personalised advertising.</p>
      <div class="flex gap-2 shrink-0">
        <button @click="gtag('consent', 'update', { 'ad_storage': 'granted', 'ad_user_data': 'granted', 'ad_personalization': 'granted', 'analytics_storage': 'granted' }); localStorage.setItem('cookieConsent', 'accepted'); showBanner = false"
                class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition">Accept</button>
        <button @click="localStorage.setItem('cookieConsent', 'rejected'); showBanner = false"

      </div>

  </div>

  <script>
  (function() {
    const consent = localStorage.getItem('cookieConsent');
    if (consent === 'accepted') {
      gtag('consent', 'update', {
        'ad_storage': 'granted',
        'ad_user_data': 'granted',
        'ad_personalization': 'granted',
        'analytics_storage': 'granted'
